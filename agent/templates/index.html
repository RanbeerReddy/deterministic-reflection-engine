<!DOCTYPE html>
<html>
<head>
    <title>Reflection Agent</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
        }
        button {
            margin: 5px 0;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Daily Reflection</h2>

<p>{{ text }}</p>

<form method="POST">
    {% if node.type == "question" %}
        {% for opt in node.options %}
            <button type="submit" name="choice" value="{{ loop.index0 }}">
                {{ opt.label }}
            </button>
        {% endfor %}
    {% else %}
        <button type="submit">Continue</button>
    {% endif %}
</form>

<br>
<a href="/reset">Restart</a>

</body>
</html>
